<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JackClaw - 离线模式</title>
<meta name="theme-color" content="#6366f1">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16181c;
    --border: #2a2d35;
    --text: #e2e4e9;
    --muted: #9ca3af;
    --accent: #6366f1;
    --accent-soft: rgba(99,102,241,.14);
    --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at top, rgba(99,102,241,.18), transparent 35%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .card {
    width: min(100%, 420px);
    background: rgba(22,24,28,.92);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 24px 60px rgba(0,0,0,.35);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: #c7d2fe;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .icon {
    font-size: 54px;
    margin-bottom: 12px;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 26px;
    line-height: 1.2;
  }
  p {
    margin: 0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }
  .tips {
    margin-top: 18px;
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.05);
  }
  .tips strong {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    color: #fef3c7;
  }
  .tips ul {
    margin: 0;
    padding-left: 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
  }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  button, a {
    appearance: none;
    border: none;
    text-decoration: none;
    cursor: pointer;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
  }
  .primary {
    background: var(--accent);
    color: white;
  }
  .secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .status {
    margin-top: 18px;
    font-size: 13px;
    color: var(--warn);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">🦞 JackClaw · Offline Mode</div>
    <div class="icon">📴</div>
    <h1>网络断开了</h1>
    <p>当前无法连接 JackClaw Hub。你仍可以查看已缓存页面；消息和操作会在恢复联网后继续同步。</p>

    <div class="tips">
      <strong>现在还能做什么</strong>
      <ul>
        <li>查看最近缓存的节点和摘要</li>
        <li>继续浏览已打开过的页面</li>
        <li>等待恢复联网后自动重试发送</li>
      </ul>
    </div>

    <div class="actions">
      <button class="primary" onclick="window.location.reload()">重新连接</button>
      <a class="secondary" href="/">返回首页</a>
    </div>

    <div class="status" id="network-status">正在检测网络状态…</div>
  </div>

<script>
  const statusEl = document.getElementById('network-status')
  function updateStatus() {
    statusEl.textContent = navigator.onLine ? '网络已恢复，可点击“重新连接”。' : '仍处于离线状态。'
  }
  window.addEventListener('online', updateStatus)
  window.addEventListener('offline', updateStatus)
  updateStatus()
</script>
</body>
</html>
