name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Run unit tests (Protocol)
        run: npx tsx --test packages/protocol/tests/*.test.ts

      - name: Run unit tests (Hub)
        run: npx tsx --test packages/hub/tests/*.test.ts

      - name: Run unit tests (LLM Gateway)
        run: npx tsx --test packages/llm-gateway/tests/*.test.ts

      - name: Run unit tests (Watchdog)
        run: npx tsx --test packages/watchdog/tests/*.test.ts

      - name: Run E2E tests
        run: node tests/e2e.js
        timeout-minutes: 5
        env:
          JWT_SECRET: ci-test-secret
