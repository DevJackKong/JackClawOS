<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
@page {
  size: A4;
  margin: 2.5cm 2cm;
  @bottom-center { content: counter(page); font-size: 10px; color: #999; }
}
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  font-size: 11pt;
  line-height: 1.8;
  color: #1a1a1a;
  max-width: 100%;
}
h1 { font-size: 22pt; font-weight: 700; margin-top: 0; color: #d63031; border-bottom: 3px solid #d63031; padding-bottom: 12px; }
h2 { font-size: 16pt; font-weight: 600; color: #2d3436; margin-top: 2em; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
h3 { font-size: 13pt; font-weight: 600; color: #636e72; margin-top: 1.5em; }
code { background: #f1f2f6; padding: 2px 6px; border-radius: 3px; font-size: 10pt; font-family: "SF Mono", "Fira Code", monospace; }
pre { background: #2d3436; color: #dfe6e9; padding: 16px; border-radius: 8px; font-size: 9.5pt; line-height: 1.6; overflow-x: auto; page-break-inside: avoid; }
pre code { background: none; color: inherit; padding: 0; }
table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 10pt; page-break-inside: avoid; }
th { background: #d63031; color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
td { padding: 8px 12px; border-bottom: 1px solid #eee; }
tr:nth-child(even) td { background: #fafafa; }
blockquote { border-left: 4px solid #d63031; margin-left: 0; padding: 8px 16px; background: #fff5f5; color: #555; font-style: italic; }
hr { border: none; border-top: 2px solid #eee; margin: 2em 0; }
strong { color: #d63031; }
a { color: #0984e3; text-decoration: none; }
.cover { text-align: center; padding: 120px 0 80px 0; page-break-after: always; }
.cover h1 { font-size: 28pt; border: none; }
.cover .subtitle { font-size: 14pt; color: #636e72; margin-top: 16px; }
.cover .author { font-size: 12pt; color: #999; margin-top: 40px; }
.emoji { font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif; }
</style>
</head>
<body>
</body>
</html>
